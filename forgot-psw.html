<body class="log-in-page">
    <div class="container">
        <div class="logo-col">

        <div class="form-container">
            <div class="form-title text-center">
                <h2 class="mb-4!">Forgot Password?</h2>
                <p>Enter your registered email. We’ll send you a link to reset your password.</p>
            </div>
            <form class="flex flex-col gap-3">

                    <label for="email" class="input-label mb-2!">Email</label>

                            </svg>
                        </span>
                        <input type="email" placeholder="Email address" required />

                </div>  
                <button type="submit" class="mt-2! btn submit-btn">Send Reset Link</button>
            </form> 
        </div>
    </div>
